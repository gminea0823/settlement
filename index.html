<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>정산 현황 관리</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#EBEBEA;color:#1E2D3D;min-height:100vh;padding:0}
  .topbar{background:#fff;border-bottom:0.5px solid #D7E2EE;padding:0 2rem;height:56px;display:flex;align-items:center;gap:10px}
  .topbar h1{font-size:16px;font-weight:500}
  .topbar i{font-size:18px;color:#6B8CAE}
  .save-status{margin-left:auto;font-size:11px;color:#A9BDD1;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .save-status i{font-size:13px}
  .save-status.saving{color:#BA7517}
  .save-status.saved{color:#6B8CAE}
  .wrap{max-width:1600px;margin:0 auto;padding:1.5rem}
  .sub{font-size:13px;color:#7C8FA6;margin-bottom:1.25rem;margin-top:4px}
  .summary{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:12px 20px;min-width:130px;border:0.5px solid #D7E2EE}
  .stat-label{font-size:11px;color:#7C8FA6;margin-bottom:2px}
  .stat-val{font-size:20px;font-weight:500;color:#1E2D3D}
  .stat-val.green{color:#6B8CAE}
  .stat-val.amber{color:#BA7517}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center}
  .toolbar button{font-size:13px;padding:7px 16px;border-radius:8px;border:0.5px solid #C7D6E5;background:#fff;color:#1E2D3D;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
  .toolbar button:hover{background:#E2EBF4}
  .toolbar button.primary{background:#6B8CAE;color:#fff;border-color:#6B8CAE}
  .toolbar button.primary:hover{background:#51718F}
  .tbl-wrap{overflow-x:auto;border-radius:12px;border:0.5px solid #D7E2EE;background:#fff}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:1150px;table-layout:fixed}
  thead tr{background:#EAF1F8}
  th{padding:10px 10px;text-align:left;font-weight:500;color:#7C8FA6;border-bottom:0.5px solid #D7E2EE;white-space:nowrap;font-size:12px;position:relative;overflow:hidden}
  td{padding:8px 10px;border-bottom:0.5px solid #E6EEF6;vertical-align:middle;overflow:hidden}
  .col-resizer{position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;user-select:none;touch-action:none}
  .col-resizer:hover,.col-resizer.active{background:#6B8CAE}
  .group-header td{background:#DCE7F2;font-weight:600;cursor:pointer;padding:9px 10px;white-space:nowrap}
  .group-header:hover td{background:#CDDDED}
  .group-header .ti{margin-right:6px;display:inline-block;transition:transform .15s}
  .group-header.collapsed .ti{transform:rotate(-90deg)}
  .group-count{color:#7C8FA6;font-weight:400;font-size:12px;margin-left:8px}
  .subgroup-header td{background:#F0F5FA;font-weight:500;color:#8095AC;font-size:12px;padding:6px 10px;border-bottom:0.5px solid #E6EEF6;cursor:pointer}
  .subgroup-header:hover td{background:#E5EEF5}
  .subgroup-header .sub-ti{display:inline-block;transition:transform .15s;margin-right:4px;font-size:12px}
  .subgroup-header.collapsed .sub-ti{transform:rotate(-90deg)}
  .group-subtotal td{background:#E5EEF6;font-weight:600;border-bottom:0.5px solid #D7E2EE;color:#1E2D3D}
  .group-subtotal .subtotal-label{text-align:right;color:#7C8FA6;font-weight:500}
  .group-subtotal .subtotal-amt{text-align:right}
  th .filter-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;cursor:pointer;color:#A9BDD1;margin-left:3px;vertical-align:middle}
  th .filter-btn:hover{background:#E1ECF6;color:#1E2D3D}
  th .filter-btn.active{color:#6B8CAE}
  th .filter-btn i{font-size:13px;pointer-events:none}
  #filterPanel{display:none;position:fixed;z-index:200;background:#fff;border:0.5px solid #C7D6E5;border-radius:8px;box-shadow:0 6px 20px rgba(107,140,174,.18);padding:8px;width:210px;font-weight:400;font-size:12px;color:#1E2D3D}
  #filterPanel.open{display:block}
  #filterPanel .fp-sort{display:flex;flex-direction:column;gap:2px;margin-bottom:6px;padding-bottom:6px;border-bottom:0.5px solid #D7E2EE}
  #filterPanel .fp-sort button{text-align:left;background:none;border:none;padding:5px 6px;border-radius:5px;cursor:pointer;font-size:12px;color:#1E2D3D;display:flex;align-items:center;gap:5px;font-family:inherit}
  #filterPanel .fp-sort button:hover{background:#E2EBF4}
  #filterPanel .fp-search{width:100%;padding:5px 7px;border:0.5px solid #C7D6E5;border-radius:5px;font-size:12px;margin-bottom:6px;font-family:inherit}
  #filterPanel .fp-actions{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
  #filterPanel .fp-actions a{color:#6B8CAE;cursor:pointer;text-decoration:none}
  #filterPanel .fp-list{max-height:160px;overflow-y:auto;border:0.5px solid #E6EEF6;border-radius:5px;padding:2px}
  #filterPanel .fp-item{display:flex;align-items:center;gap:6px;padding:3px 5px;border-radius:4px;cursor:pointer;font-size:12px}
  #filterPanel .fp-item:hover{background:#E2EBF4}
  #filterPanel .fp-buttons{display:flex;gap:6px;margin-top:8px}
  #filterPanel .fp-buttons button{flex:1;padding:6px;border-radius:6px;border:0.5px solid #C7D6E5;background:#fff;cursor:pointer;font-size:12px;font-family:inherit}
  #filterPanel .fp-buttons button.primary{background:#6B8CAE;color:#fff;border-color:#6B8CAE}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#F4F8FC}
  tr.row-ju td{background:#FAF5FF}
  tr.row-ju:hover td{background:#F3E8FF}
  tr.row-il td{background:#EFF6FF}
  tr.row-il:hover td{background:#DBEAFE}
  .editable{background:transparent;border:none;outline:none;font-size:13px;color:#1E2D3D;width:100%;font-family:inherit;padding:3px 5px;border-radius:5px}
  .editable:focus{background:#E2EBF4;outline:2px solid #6B8CAE;outline-offset:-1px}
  input[type="date"].editable{min-width:100px;cursor:pointer}
  select.status-sel{font-size:12px;padding:4px 8px;border-radius:20px;border:0.5px solid;cursor:pointer;font-family:inherit;outline:none;background:transparent;transition:all .15s}
  select.done{background:#EAF3DE;color:#3B6D11;border-color:#639922}
  select.pending{background:#FAEEDA;color:#854F0B;border-color:#BA7517}
  select.none{background:#E6EEF5;color:#8094A8;border-color:#C7D6E5}
  select.type-il{background:#E3F2FD;color:#1565C0;border-color:#42A5F5}
  select.type-ju{background:#F3E5F5;color:#6A1B9A;border-color:#AB47BC}
  .search-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
  .search-bar select{padding:7px 10px;border:0.5px solid #C7D6E5;border-radius:8px;font-size:13px;color:#1E2D3D;background:#fff;cursor:pointer;font-family:inherit;outline:none}
  .search-bar input[type="text"]{flex:1;max-width:320px;padding:7px 12px;border:0.5px solid #C7D6E5;border-radius:8px;font-size:13px;color:#1E2D3D;background:#fff;outline:none;font-family:inherit}
  .search-bar input[type="text"]:focus{border-color:#6B8CAE;box-shadow:0 0 0 2px rgba(107,140,174,.15)}
  .search-bar .search-clear{background:none;border:none;cursor:pointer;color:#A9BDD1;font-size:15px;padding:4px 6px;border-radius:5px;display:none}
  .search-bar .search-clear:hover{color:#E24B4A}
  .search-bar .search-clear.visible{display:inline-flex;align-items:center}
  .search-result-tag{font-size:12px;color:#6B8CAE;white-space:nowrap}
  .sec-btn{background:none;border:0.5px solid #B8CEDF;border-radius:5px;font-size:11px;padding:2px 8px;cursor:pointer;color:#7C8FA6;font-family:inherit;white-space:nowrap}
  .sec-btn:hover{background:#fff;color:#1E2D3D;border-color:#6B8CAE}
  .subgroup-header td{overflow:visible}
  .row-num{color:#A9BDD1;font-size:11px;text-align:center;width:28px}
  .del-btn{background:none;border:none;cursor:pointer;color:#A9BDD1;font-size:15px;padding:3px 7px;border-radius:5px}
  .del-btn:hover{color:#E24B4A;background:#FCEBEB}
  .amount-input{text-align:right}
  @media(max-width:768px){
    .wrap{padding:1rem .75rem}
    .topbar{padding:0 1rem}
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body>

<div class="topbar">
  <i class="ti ti-receipt-2"></i>
  <h1>정산 현황 관리</h1>
  <div class="save-status" id="saveStatus"><i class="ti ti-cloud-check"></i><span>불러오는 중...</span></div>
</div>

<div class="wrap">
  <p class="sub">셀을 클릭하면 직접 수정할 수 있어요. 정산현황·세금계산서는 드롭박스로 변경하세요.</p>

  <div class="summary" id="summary"></div>

  <div class="toolbar">
    <button class="primary" onclick="addRow()"><i class="ti ti-plus"></i> 행 추가</button>
    <button onclick="document.getElementById('excelInput').click()"><i class="ti ti-file-spreadsheet"></i> 엑셀 업로드</button>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this.files[0])">
    <button onclick="document.getElementById('acctInput').click()"><i class="ti ti-building-bank"></i> 계좌정보 업로드</button>
    <input type="file" id="acctInput" accept=".xlsx,.xls" style="display:none" onchange="importAccountInfo(this.files[0])">
    <button onclick="exportCSV()"><i class="ti ti-download"></i> CSV 저장</button>
  </div>

  <div class="search-bar">
    <i class="ti ti-search" style="color:#A9BDD1;font-size:16px"></i>
    <select id="searchField" onchange="doSearch()">
      <option value="company">협력사별</option>
      <option value="rep">대표자별</option>
    </select>
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요" oninput="doSearch()">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" title="검색 초기화"><i class="ti ti-x"></i></button>
    <span class="search-result-tag" id="searchResultTag"></span>
  </div>

  <div class="tbl-wrap">
    <table id="tbl">
      <colgroup>
        <col style="width:40px">
        <col style="width:110px">
        <col style="width:110px">
        <col style="width:160px">
        <col style="width:80px">
        <col style="width:135px">
        <col style="width:80px">
        <col style="width:90px">
        <col style="width:110px">
        <col style="width:90px">
        <col style="width:110px">
        <col style="width:36px">
      </colgroup>
      <thead>
        <tr id="headRow">
          <th style="width:32px">#</th>
          <th>정산시작일<span class="filter-btn" data-key="startDate" onclick="toggleFilterPanel(event,'startDate')"><i class="ti ti-filter"></i></span></th>
          <th>정산종료일<span class="filter-btn" data-key="endDate" onclick="toggleFilterPanel(event,'endDate')"><i class="ti ti-filter"></i></span></th>
          <th>소속 협력사<span class="filter-btn" data-key="company" onclick="toggleFilterPanel(event,'company')"><i class="ti ti-filter"></i></span></th>
          <th>대표자<span class="filter-btn" data-key="rep" onclick="toggleFilterPanel(event,'rep')"><i class="ti ti-filter"></i></span></th>
          <th>계좌번호<span class="filter-btn" data-key="acct" onclick="toggleFilterPanel(event,'acct')"><i class="ti ti-filter"></i></span></th>
          <th>은행<span class="filter-btn" data-key="bank" onclick="toggleFilterPanel(event,'bank')"><i class="ti ti-filter"></i></span></th>
          <th>정산구분<span class="filter-btn" data-key="settleType" onclick="toggleFilterPanel(event,'settleType')"><i class="ti ti-filter"></i></span></th>
          <th style="text-align:right">이체금액 (원)<span class="filter-btn" data-key="amount" onclick="toggleFilterPanel(event,'amount')"><i class="ti ti-filter"></i></span></th>
          <th>정산현황<span class="filter-btn" data-key="settle" onclick="toggleFilterPanel(event,'settle')"><i class="ti ti-filter"></i></span></th>
          <th>세금계산서 발행<span class="filter-btn" data-key="tax" onclick="toggleFilterPanel(event,'tax')"><i class="ti ti-filter"></i></span></th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="filterPanel"></div>
</div>

<script>
const today = new Date().toISOString().split('T')[0];

// ── Supabase ──────────────────────────────────────────────
const _SB_URL  = 'https://micquonnaxyhwxwksctf.supabase.co';
const _SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pY3F1b25uYXh5aHd4d2tzY3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTY0MDgsImV4cCI6MjA5NjY5MjQwOH0.9S0DhscVBWUw1nerK5weF5GMoJaTTZHLtL91yOaqHR0';
const _RECORD  = 'main';
const sb = supabase.createClient(_SB_URL, _SB_KEY);
// ─────────────────────────────────────────────────────────

// localStorage로 즉시 초기 렌더링 (Supabase 로드 전 빠른 표시)
let rows = JSON.parse(localStorage.getItem('settle_rows') || 'null') || [
  {startDate:today,endDate:today,company:'',rep:'',acct:'',bank:'',settleType:'',amount:'',settle:'',tax:''}
];
function migrateRows(arr){
  arr.forEach(r=>{
    if(r.startDate===undefined) r.startDate = r.date || today;
    if(r.endDate===undefined) r.endDate = r.date || today;
    if(r.settle==='미완료') r.settle = '';
    if(r.tax==='미완료') r.tax = '';
    if(r.settleType===undefined) r.settleType = '';
  });
}
migrateRows(rows);

let collapsedGroups    = JSON.parse(localStorage.getItem('settle_collapsed')     || '[]');
let collapsedSubGroups = JSON.parse(localStorage.getItem('settle_sub_collapsed') || '[]');
let acctMap            = JSON.parse(localStorage.getItem('settle_acctmap')       || '{}');
let sectionTarget = null;
function setSectionTarget(indices, startDate, endDate){
  sectionTarget = {indices, startDate: startDate||today, endDate: endDate||today};
}
const FILTER_COLS = {
  startDate:{label:'정산시작일'},
  endDate:{label:'정산종료일'},
  company:{label:'소속 협력사'},
  rep:{label:'대표자'},
  acct:{label:'계좌번호'},
  bank:{label:'은행'},
  settleType:{label:'정산구분', display:v=>v||'-'},
  amount:{label:'이체금액', numeric:true, display:v=>v===''?'(공백)':formatAmount(v)},
  settle:{label:'정산현황', display:v=>v==='완료'?'✓ 완료':v==='미완료'?'✗ 미완료':'-'},
  tax:{label:'세금계산서 발행', display:v=>v==='완료'?'✓ 완료':v==='미완료'?'✗ 미완료':'-'}
};

let columnFilters = {}; // key -> Set of allowed raw values (없으면 전체 허용)
let searchQuery = '';
let searchField = 'company';

function matchesFilters(r){
  if(searchQuery){
    const val = (r[searchField]||'').toLowerCase();
    if(!val.includes(searchQuery.toLowerCase())) return false;
  }
  for(const key in columnFilters){
    if(!columnFilters[key].has(r[key]||'')) return false;
  }
  return true;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function toggleFilterPanel(e,key){
  e.stopPropagation();
  const panel = document.getElementById('filterPanel');
  const wasOpenForKey = panel.classList.contains('open') && panel.dataset.key===key;
  panel.classList.remove('open');
  if(wasOpenForKey) return;

  panel.dataset.key = key;
  panel.innerHTML = buildFilterPanel(key);

  const rect = e.currentTarget.getBoundingClientRect();
  let left = rect.left;
  const maxLeft = window.innerWidth - 220;
  if(left > maxLeft) left = Math.max(8, maxLeft);
  panel.style.top = (rect.bottom + 4) + 'px';
  panel.style.left = left + 'px';
  panel.classList.add('open');
}

document.addEventListener('click', (e)=>{
  const panel = document.getElementById('filterPanel');
  if(panel.classList.contains('open') && !e.target.closest('#filterPanel') && !e.target.closest('.filter-btn')){
    panel.classList.remove('open');
  }
});

function buildFilterPanel(key){
  const col = FILTER_COLS[key];
  const valuesSet = new Set();
  rows.forEach(r=> valuesSet.add(r[key] || ''));
  const values = Array.from(valuesSet).sort((a,b)=>{
    if(col.numeric) return (parseFloat(String(a).replace(/[^0-9.\-]/g,''))||0) - (parseFloat(String(b).replace(/[^0-9.\-]/g,''))||0);
    return String(a).localeCompare(String(b),'ko');
  });

  const active = columnFilters[key];
  const checkedSet = active || new Set(values);

  const itemsHtml = values.map(v=>{
    const label = col.display ? col.display(v) : (v===''?'(공백)':v);
    const checked = checkedSet.has(v);
    return `<label class="fp-item"><input type="checkbox" value="${escapeHtml(v)}" ${checked?'checked':''}><span>${escapeHtml(label)}</span></label>`;
  }).join('');

  return `
    <div class="fp-sort">
      <button onclick="sortByColumn('${key}','asc')"><i class="ti ti-sort-ascending-2"></i> 오름차순 정렬</button>
      <button onclick="sortByColumn('${key}','desc')"><i class="ti ti-sort-descending-2"></i> 내림차순 정렬</button>
    </div>
    <input type="text" class="fp-search" placeholder="검색" oninput="filterFpList(this,'${key}')">
    <div class="fp-actions">
      <a onclick="fpSelectAll('${key}',true)">모두 선택</a>
      <a onclick="fpSelectAll('${key}',false)">모두 지우기</a>
    </div>
    <div class="fp-list" id="fp-list-${key}">${itemsHtml}</div>
    <div class="fp-buttons">
      <button onclick="closeFilterPanel()">취소</button>
      <button class="primary" onclick="applyFilter('${key}')">확인</button>
    </div>
  `;
}

function filterFpList(input,key){
  const term = input.value.trim().toLowerCase();
  document.querySelectorAll(`#fp-list-${key} .fp-item`).forEach(item=>{
    item.style.display = item.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
}

function fpSelectAll(key,checked){
  document.querySelectorAll(`#fp-list-${key} .fp-item`).forEach(item=>{
    if(item.style.display !== 'none') item.querySelector('input').checked = checked;
  });
}

function closeFilterPanel(){
  document.getElementById('filterPanel').classList.remove('open');
}

function doSearch(){
  searchQuery = document.getElementById('searchInput').value.trim();
  searchField = document.getElementById('searchField').value;
  const clearBtn = document.getElementById('searchClear');
  const tag = document.getElementById('searchResultTag');
  clearBtn.classList.toggle('visible', searchQuery.length > 0);
  if(!searchQuery){ tag.textContent = ''; render(); return; }
  render();
  const matchCount = rows.filter(r=>matchesFilters(r)).length;
  tag.textContent = `${matchCount}건`;
}

function clearSearch(){
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchResultTag').textContent = '';
  render();
}

function applyFilter(key){
  const checked = new Set();
  let allChecked = true;
  document.querySelectorAll(`#fp-list-${key} .fp-item input`).forEach(cb=>{
    if(cb.checked) checked.add(cb.value); else allChecked = false;
  });
  if(allChecked) delete columnFilters[key];
  else columnFilters[key] = checked;
  closeFilterPanel();
  render();
}

function sortByColumn(key,dir){
  const col = FILTER_COLS[key];
  rows.sort((a,b)=>{
    const av = a[key]||'', bv = b[key]||'';
    let cmp = col.numeric
      ? (parseFloat(String(av).replace(/[^0-9.\-]/g,''))||0) - (parseFloat(String(bv).replace(/[^0-9.\-]/g,''))||0)
      : String(av).localeCompare(String(bv),'ko');
    return dir==='asc' ? cmp : -cmp;
  });
  closeFilterPanel();
  autoSave();
  render();
}

function buildAcctLookup(){
  // acctMap(계좌정보 업로드) + 기존 행에 직접 입력된 데이터를 합산
  const map = Object.assign({}, acctMap);
  rows.forEach(r=>{
    if(r.company && (r.rep||r.acct||r.bank||r.settleType)){
      map[r.company] = {
        rep:        r.rep        || (map[r.company]||{}).rep        || '',
        acct:       r.acct       || (map[r.company]||{}).acct       || '',
        bank:       r.bank       || (map[r.company]||{}).bank       || '',
        settleType: r.settleType || (map[r.company]||{}).settleType || ''
      };
    }
  });
  return map;
}

function applyAcctMap(){
  rows.forEach(r=>{
    if(r.company && acctMap[r.company]){
      r.rep = acctMap[r.company].rep;
      r.acct = acctMap[r.company].acct;
      r.bank = acctMap[r.company].bank;
    }
  });
}

// 엑셀 업로드 후 자동완성: 비어있는 필드만 채움
function autoFillNewRows(){
  const map = buildAcctLookup();
  rows.forEach(r=>{
    if(r.company && map[r.company]){
      const m = map[r.company];
      if(!r.rep && !r.acct && !r.bank){
        r.rep = m.rep; r.acct = m.acct; r.bank = m.bank;
      }
      if(!r.settleType && m.settleType) r.settleType = m.settleType;
    }
  });
}

function onCompanyBlur(i){
  const company = rows[i].company;
  const map = buildAcctLookup();
  if(company && map[company]){
    const m = map[company];
    rows[i].rep = m.rep; rows[i].acct = m.acct; rows[i].bank = m.bank;
    if(!rows[i].settleType && m.settleType) rows[i].settleType = m.settleType;
    autoSave();
    render();
  }
}

function groupKey(dateStr){
  if(!dateStr) return '날짜없음';
  const [y,m] = dateStr.split('-');
  return `${y.slice(2)}년 ${parseInt(m,10)}월`;
}

function formatShortDate(dateStr){
  if(!dateStr) return '';
  const [y,m,d] = dateStr.split('-');
  return `${parseInt(m,10)}.${parseInt(d,10)}`;
}

function dateRangeLabel(start,end){
  if(!start && !end) return '날짜없음';
  if(start===end) return formatShortDate(start);
  return `${formatShortDate(start)} ~ ${formatShortDate(end)}`;
}

function toggleGroup(key){
  const idx = collapsedGroups.indexOf(key);
  if(idx>=0) collapsedGroups.splice(idx,1); else collapsedGroups.push(key);
  autoSave();
  render();
}

function toggleSubGroup(key){
  const idx = collapsedSubGroups.indexOf(key);
  if(idx>=0) collapsedSubGroups.splice(idx,1); else collapsedSubGroups.push(key);
  autoSave();
  render();
}

function render(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';

  // 정산종료일 기준 연/월 그룹으로 묶기 (필터 적용)
  const groups = {};
  rows.forEach((r,i)=>{
    if(!matchesFilters(r)) return;
    const key = groupKey(r.endDate);
    (groups[key] = groups[key] || []).push(i);
  });
  const sortedKeys = Object.keys(groups).sort((a,b)=>{
    const da = rows[groups[a][0]].endDate || '';
    const db = rows[groups[b][0]].endDate || '';
    return db.slice(0,7).localeCompare(da.slice(0,7));
  });

  if(sortedKeys.length===0){
    tb.innerHTML = '<tr><td colspan="12" style="text-align:center;color:#888780;padding:20px">검색 결과가 없어요.</td></tr>';
    updateSummary();
    updateFilterBtnStates();
    return;
  }

  sortedKeys.forEach(key=>{
    const indices = groups[key];
    const collapsed = collapsedGroups.includes(key);

    const headerTr = document.createElement('tr');
    headerTr.className = 'group-header'+(collapsed?' collapsed':'');
    headerTr.innerHTML = `<td colspan="12" onclick="toggleGroup('${key}')"><i class="ti ti-chevron-down"></i>${key}<span class="group-count">${indices.length}건</span></td>`;
    tb.appendChild(headerTr);

    if(!collapsed){
      // 정산시작일~정산종료일 구간(주차)별로 다시 묶기
      const subGroups = {};
      indices.forEach(i=>{
        const r = rows[i];
        const subKey = `${r.startDate}__${r.endDate}`;
        (subGroups[subKey] = subGroups[subKey] || []).push(i);
      });
      const subKeys = Object.keys(subGroups).sort((a,b)=>{
        const sa = rows[subGroups[a][0]].startDate || '';
        const sb = rows[subGroups[b][0]].startDate || '';
        return sa.localeCompare(sb);
      });

      subKeys.forEach(subKey=>{
        const subIndices = subGroups[subKey];
        const first = rows[subIndices[0]];
        const label = dateRangeLabel(first.startDate, first.endDate);
        const subCollapsed = collapsedSubGroups.includes(subKey);
        const escapedSubKey = subKey.replace(/'/g,"\\'");

        const subHeaderTr = document.createElement('tr');
        subHeaderTr.className = 'subgroup-header' + (subCollapsed ? ' collapsed' : '');
        subHeaderTr.innerHTML = `<td colspan="12" onclick="toggleSubGroup('${escapedSubKey}')"><div style="display:flex;align-items:center;gap:6px"><i class="ti ti-chevron-down sub-ti"></i>${label}<span class="group-count">${subIndices.length}건</span><span style="margin-left:auto;display:flex;gap:4px"><button class="sec-btn" onclick="event.stopPropagation();setSectionTarget([${subIndices.join(',')}],'${first.startDate}','${first.endDate}');document.getElementById('excelInput').click()" title="이 구간 엑셀 업로드"><i class="ti ti-file-spreadsheet" style="font-size:11px"></i> 엑셀 업로드</button><button class="sec-btn" onclick="event.stopPropagation();setSectionTarget([${subIndices.join(',')}]);document.getElementById('acctInput').click()" title="이 구간 계좌정보 업로드"><i class="ti ti-building-bank" style="font-size:11px"></i> 계좌 업로드</button><button class="sec-btn" onclick="event.stopPropagation();resetSectionExcel([${subIndices.join(',')}])" title="이 구간 협력사·이체금액·정산일 초기화"><i class="ti ti-eraser" style="font-size:11px"></i> 초기화</button><button class="sec-btn" onclick="event.stopPropagation();resetSectionAcct([${subIndices.join(',')}])" title="이 구간 대표자·계좌·은행 초기화"><i class="ti ti-trash" style="font-size:11px"></i> 계좌 초기화</button><button class="sec-btn" style="color:#E24B4A;border-color:#F5C0BF" onclick="event.stopPropagation();deleteSectionRows([${subIndices.join(',')}])" title="이 구간 행 전체 삭제"><i class="ti ti-trash-x" style="font-size:11px"></i> 전체 삭제</button></span></div></td>`;
        tb.appendChild(subHeaderTr);

        if(!subCollapsed){
          subIndices.forEach(i=>{
            const tr = document.createElement('tr');
            tr.dataset.idx = i;
            if(rows[i].settleType==='주정산')  tr.classList.add('row-ju');
          if(rows[i].settleType==='일선정산') tr.classList.add('row-il');
            tr.innerHTML = rowHtml(rows[i], i);
            tb.appendChild(tr);
          });

          const subtotal = subIndices.reduce((s,i)=>s+(parseFloat(String(rows[i].amount).replace(/[^0-9.\-]/g,''))||0),0);
          const subtotalTr = document.createElement('tr');
          subtotalTr.className = 'group-subtotal';
          subtotalTr.innerHTML = `<td colspan="8" class="subtotal-label">${label} 이체 합계</td><td class="subtotal-amt">${formatAmount(subtotal)}</td><td colspan="3"></td>`;
          tb.appendChild(subtotalTr);
        }
      });
    }
  });

  updateSummary();
  updateFilterBtnStates();
}

function updateFilterBtnStates(){
  document.querySelectorAll('#headRow .filter-btn').forEach(btn=>{
    btn.classList.toggle('active', !!columnFilters[btn.dataset.key]);
  });
}

function statusClass(v){
  return v==='완료' ? 'done' : v==='미완료' ? 'pending' : 'none';
}

function settleTypeClass(v){
  return v==='일선정산' ? 'type-il' : v==='주정산' ? 'type-ju' : 'none';
}

function resetSectionExcel(indices){
  if(!confirm(`이 구간 ${indices.length}건의 협력사명·이체금액·정산시작일·정산종료일을 초기화할까요?`)) return;
  indices.forEach(i=>{
    rows[i].company=''; rows[i].amount='';
    rows[i].startDate=today; rows[i].endDate=today;
  });
  autoSave(); render();
}

function resetSectionAcct(indices){
  if(!confirm(`이 구간 ${indices.length}건의 대표자·계좌번호·은행을 초기화할까요?`)) return;
  indices.forEach(i=>{ rows[i].rep=''; rows[i].acct=''; rows[i].bank=''; });
  autoSave(); render();
}

function deleteSectionRows(indices){
  if(!confirm(`이 구간 ${indices.length}건을 모두 삭제할까요?\n되돌릴 수 없어요.`)) return;
  const idxSet = new Set(indices);
  rows = rows.filter((_,i)=>!idxSet.has(i));
  if(rows.length===0) rows.push({startDate:today,endDate:today,company:'',rep:'',acct:'',bank:'',settleType:'',amount:'',settle:'',tax:''});
  autoSave(); render();
}

function formatAmount(v){
  if(v===''||v===null||v===undefined) return '';
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  if(isNaN(n)) return '';
  return n.toLocaleString('ko-KR',{maximumFractionDigits:2});
}

function updateSummary(){
  const total = rows.length;
  const done = rows.filter(r=>r.settle==='완료').length;
  const pending = total - done;
  const totalAmt = rows.reduce((s,r)=>s+(parseFloat(String(r.amount).replace(/[^0-9.\-]/g,''))||0),0);
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">전체 건수</div><div class="stat-val amber">${total}건</div></div>
    <div class="stat"><div class="stat-label">정산 완료</div><div class="stat-val green">${done}건</div></div>
    <div class="stat"><div class="stat-label">정산 미완료</div><div class="stat-val amber">${pending}건</div></div>
    <div class="stat"><div class="stat-label">총 이체금액</div><div class="stat-val amber">${totalAmt.toLocaleString()}원</div></div>
  `;
}

function addRow(){
  const newIdx = rows.length;
  rows.push({startDate:today,endDate:today,company:'',rep:'',acct:'',bank:'',settleType:'',amount:'',settle:'',tax:''});
  autoSave();
  render();
  setTimeout(()=>{
    const tr = document.querySelector(`#tbody tr[data-idx="${newIdx}"]`);
    const inputs = tr ? tr.querySelectorAll('input') : [];
    if(inputs[2]) inputs[2].focus();
  },50);
}

function delRow(i){
  if(rows.length<=1){alert('마지막 행은 삭제할 수 없어요.');return;}
  if(confirm('이 행을 삭제할까요?')){rows.splice(i,1);autoSave();render();}
}

let autoTimer;
let _lastSyncStr = null; // 내 저장으로 발생한 realtime 이벤트 무시용

function setSaveStatus(state){
  const el = document.getElementById('saveStatus');
  if(!el) return;
  if(state==='saving'){
    el.className='save-status saving';
    el.innerHTML='<i class="ti ti-loader-2"></i><span>저장 중...</span>';
  } else if(state==='loading'){
    el.className='save-status saving';
    el.innerHTML='<i class="ti ti-loader-2"></i><span>불러오는 중...</span>';
  } else {
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
    el.className='save-status saved';
    el.innerHTML='<i class="ti ti-cloud-check"></i><span>저장됨 '+t+'</span>';
  }
}

async function saveToDB(){
  const payload = {
    id: _RECORD,
    rows,
    acct_map: acctMap,
    collapsed_groups: collapsedGroups,
    collapsed_sub_groups: collapsedSubGroups,
    updated_at: new Date().toISOString()
  };
  _lastSyncStr = JSON.stringify(rows);
  // localStorage 백업
  localStorage.setItem('settle_rows',           JSON.stringify(rows));
  localStorage.setItem('settle_collapsed',       JSON.stringify(collapsedGroups));
  localStorage.setItem('settle_sub_collapsed',   JSON.stringify(collapsedSubGroups));
  localStorage.setItem('settle_acctmap',         JSON.stringify(acctMap));
  const { error } = await sb.from('settlement_data').upsert(payload);
  if(error) console.error('Supabase 저장 오류:', error);
}

function autoSave(){
  setSaveStatus('saving');
  clearTimeout(autoTimer);
  autoTimer = setTimeout(async ()=>{
    await saveToDB();
    setSaveStatus('saved');
  }, 400);
}

function forceSave(){
  clearTimeout(autoTimer);
  saveToDB().then(()=>setSaveStatus('saved'));
}

function subscribeToChanges(){
  sb.channel('settlement-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'settlement_data', filter:`id=eq.${_RECORD}`}, payload=>{
      if(!payload.new || !payload.new.rows) return;
      const d = payload.new;
      // 내 저장으로 발생한 이벤트 무시
      if(_lastSyncStr && JSON.stringify(d.rows) === _lastSyncStr){ _lastSyncStr=null; return; }
      _lastSyncStr = null;
      rows              = d.rows;
      acctMap           = d.acct_map           || {};
      collapsedGroups    = d.collapsed_groups    || [];
      collapsedSubGroups = d.collapsed_sub_groups|| [];
      migrateRows(rows);
      render();
      setSaveStatus('saved');
    })
    .subscribe();
}

async function init(){
  setSaveStatus('loading');
  try {
    const { data, error } = await sb.from('settlement_data').select('*').eq('id', _RECORD).single();
    if(!error && data && data.rows){
      rows              = data.rows.length ? data.rows : rows;
      acctMap           = data.acct_map            || {};
      collapsedGroups    = data.collapsed_groups    || [];
      collapsedSubGroups = data.collapsed_sub_groups|| [];
      migrateRows(rows);
    }
  } catch(e){ console.warn('Supabase 로드 실패, localStorage 사용:', e); }
  render();
  initColResize();
  setSaveStatus('saved');
  subscribeToChanges();
}

function excelDateToStr(v){
  if(v instanceof Date && !isNaN(v)) {
    return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  }
  if(typeof v==='string'){
    const m = v.match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
    if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    return v;
  }
  if(typeof v==='number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(d) return d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');
  }
  return today;
}

function importExcel(file){
  if(!file) return;
  const target = sectionTarget; sectionTarget = null;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
    if(aoa.length < 2){ alert('데이터가 없는 파일이에요.'); return; }

    const header = aoa[0].map(h=>String(h||'').trim());
    const startCol = header.findIndex(h=>h.includes('정산시작일'));
    const endCol = header.findIndex(h=>h.includes('정산종료일'));
    let companyCol = header.findIndex(h=>h.includes('협력사명'));
    if(companyCol===-1) companyCol = header.findIndex(h=>h.includes('협력사')&&!h.includes('아이디')&&!h.toUpperCase().includes('ID'));
    const amountCol = header.findIndex(h=>h.includes('정산예정금액'));

    if(companyCol===-1||amountCol===-1){
      alert('필요한 컬럼(협력사명/정산예정금액)을 찾을 수 없어요.');
      return;
    }

    const dataRows = aoa.slice(1).filter(r=>r && r[companyCol]);

    if(target){
      // 섹션별 업로드: 해당 섹션 행 순서대로 업데이트, 초과분은 섹션 날짜로 신규 추가
      let updated = 0, added = 0;
      dataRows.forEach((r, idx)=>{
        const rowIdx = target.indices[idx];
        if(rowIdx !== undefined){
          rows[rowIdx].company = String(r[companyCol]);
          rows[rowIdx].amount  = Number(r[amountCol]||0).toFixed(2);
          rows[rowIdx].startDate = target.startDate;
          rows[rowIdx].endDate   = target.endDate;
          updated++;
        } else {
          rows.push({startDate:target.startDate, endDate:target.endDate,
            company:String(r[companyCol]), rep:'', acct:'', bank:'',
            settleType:'', amount:Number(r[amountCol]||0).toFixed(2), settle:'', tax:''});
          added++;
        }
      });
      autoFillNewRows(); render(); autoSave();
      alert(`${updated}건 업데이트, ${added}건 신규 추가했어요.`);
    } else {
      // 전체 업로드
      if(startCol===-1||endCol===-1){
        alert('필요한 컬럼(정산시작일/정산종료일)을 찾을 수 없어요.'); return;
      }
      if(rows.length===1 && !rows[0].company && !rows[0].amount) rows = [];
      let added = 0;
      dataRows.forEach(r=>{
        rows.push({startDate:excelDateToStr(r[startCol]), endDate:excelDateToStr(r[endCol]),
          company:String(r[companyCol]), rep:'', acct:'', bank:'',
          settleType:'', amount:Number(r[amountCol]||0).toFixed(2), settle:'', tax:''});
        added++;
      });
      autoFillNewRows(); render(); autoSave();
      alert(`${added}건의 데이터를 불러왔어요.`);
    }
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('excelInput').value='';
}

function importAccountInfo(file){
  if(!file) return;
  const target = sectionTarget; sectionTarget = null;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
    if(aoa.length < 2){ alert('데이터가 없는 파일이에요.'); return; }

    const header = aoa[0].map(h=>String(h||'').trim());
    let companyCol = header.findIndex(h=>h.includes('협력사명'));
    if(companyCol===-1) companyCol = header.findIndex(h=>h.includes('협력사')&&!h.includes('아이디')&&!h.toUpperCase().includes('ID'));
    const repCol = header.findIndex(h=>h.includes('대표자'));

    if(bankCol===-1) bankCol = header.findIndex(h=>h.includes('은행'));

    if(companyCol===-1||repCol===-1||acctCol===-1||bankCol===-1){
      alert('필요한 컬럼(소속협력사/대표자/계좌번호/은행)을 찾을 수 없어요.');
      return;
    }

    const infoMap = {};
    for(let i=1;i<aoa.length;i++){
      const r = aoa[i];
      const company = String(r[companyCol]||'').trim();
      if(!company) continue;
      infoMap[company] = {
        rep: String(r[repCol]||'').trim(),
        acct: String(r[acctCol]||'').trim(),
        bank: String(r[bankCol]||'').trim()
      };
    }

    // 섹션 또는 전체에서 협력사명 기준 매칭
    const targetIndices = target ? target.indices : rows.map((_,i)=>i);
    let updated = 0;
    targetIndices.forEach(i=>{
      const r = rows[i];
      if(r.company && infoMap[r.company]){
        const info = infoMap[r.company];
        r.rep = info.rep; r.acct = info.acct; r.bank = info.bank;
        acctMap[r.company] = info;
        updated++;
      }
    });

    const unmatched = Object.keys(infoMap).filter(c=>!targetIndices.some(i=>rows[i].company===c)).length;

    localStorage.setItem('settle_acctmap', JSON.stringify(acctMap));
    render(); autoSave();

    let msg = `${updated}건의 계좌정보를 갱신했어요.`;
    if(unmatched>0) msg += `\n소속협력사가 일치하지 않는 ${unmatched}건은 반영되지 않았어요.`;
    alert(msg);
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('acctInput').value='';
}

function resetExcelFields(){
  if(!confirm('모든 행의 협력사명·이체금액·정산시작일·정산종료일을 초기화할까요?\n(대표자·계좌·은행·정산현황은 유지됩니다)')) return;
  rows.forEach(r=>{
    r.company = '';
    r.amount = '';
    r.startDate = today;
    r.endDate = today;
  });
  autoSave();
  render();
}

function resetAccountFields(){
  if(!confirm('모든 행의 대표자·계좌번호·은행을 초기화할까요?')) return;
  rows.forEach(r=>{ r.rep=''; r.acct=''; r.bank=''; });
  acctMap = {};
  localStorage.setItem('settle_acctmap', JSON.stringify(acctMap));
  autoSave();
  render();
}

function exportCSV(){
  const headers=['정산시작일','정산종료일','소속협력사','대표자','계좌','은행','정산구분','이체금액','정산현황','세금계산서발행'];
  const lines=['\uFEFF'+headers.join(',')];
  rows.forEach(r=>lines.push([r.startDate,r.endDate,'"'+r.company+'"','"'+r.rep+'"','"'+r.acct+'"','"'+r.bank+'"',r.settleType||'',r.amount,r.settle,r.tax].join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='정산현황_'+today+'.csv';a.click();
}

function initColResize(){
  const cols = document.querySelectorAll('#tbl colgroup col');
  const ths = document.querySelectorAll('#headRow th');
  const LAYOUT_VER = '2';
  if(localStorage.getItem('settle_layout_ver') !== LAYOUT_VER){
    localStorage.removeItem('settle_colwidths');
    localStorage.setItem('settle_layout_ver', LAYOUT_VER);
  }
  const saved = JSON.parse(localStorage.getItem('settle_colwidths')||'null');
  if(saved){
    cols.forEach((col,i)=>{ if(saved[i]) col.style.width = saved[i]+'px'; });
  }
  ths.forEach((th,i)=>{
    if(i>=cols.length-1) return; // 마지막(삭제) 컬럼은 크기 조절 제외
    const resizer = document.createElement('span');
    resizer.className = 'col-resizer';
    th.appendChild(resizer);
    resizer.addEventListener('mousedown', (e)=>{
      e.preventDefault();
      const startX = e.pageX;
      const startW = cols[i].getBoundingClientRect().width;
      resizer.classList.add('active');
      function onMove(ev){
        const w = Math.max(30, startW + (ev.pageX - startX));
        cols[i].style.width = w+'px';
      }
      function onUp(){
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        resizer.classList.remove('active');
        const widths = Array.from(cols).map(c=>c.getBoundingClientRect().width);
        localStorage.setItem('settle_colwidths', JSON.stringify(widths));
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

window.addEventListener('beforeunload', forceSave);

init();
</script>
